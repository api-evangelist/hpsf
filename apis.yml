aid: hpsf
name: High Performance Software Foundation
description: >-
  The High Performance Software Foundation (HPSF) is a Linux Foundation project
  supporting open source software for high-performance computing and scientific
  computing. It hosts projects including Apptainer, Spack, Kokkos, and E4S for
  building and deploying scientific applications at scale.
